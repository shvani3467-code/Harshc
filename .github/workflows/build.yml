name: Build Android APK with Briefcase

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libcairo2-dev libgirepository1.0-dev

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Build Android APK
        run: |
          briefcase build android --no-input
          briefcase package android --no-input

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-android-apk
          path: android/gradle/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

