

name: Build Android APK with Briefcase

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java / JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          pip install briefcase toga

      - name: Create & Package Android App
        run: |
          briefcase create android --non-interactive
          briefcase build android --non-interactive
          briefcase package android --non-interactive

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-app-apk
          path: |
            **/build/outputs/apk/**/*.apk
          if-no-files-found: error
